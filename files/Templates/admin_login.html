<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — NoteShare</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--pink:#e0217a;--dark:#1a1a2e;--surface:#fff;--bg:#f5f5f7;--border:rgba(0,0,0,0.09);--radius:12px}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    body::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(224,33,122,0.18) 0%,transparent 70%);top:-100px;left:50%;transform:translateX(-50%);pointer-events:none}
    .card{background:var(--surface);border-radius:20px;padding:40px 36px;width:100%;max-width:400px;margin:20px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.3)}
    .logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;color:var(--pink);justify-content:center;margin-bottom:8px}
    .logo i{font-size:26px}
    .subtitle{text-align:center;font-size:13px;color:#888;margin-bottom:32px}
    .lock-icon{width:56px;height:56px;background:rgba(224,33,122,0.1);border:1px solid rgba(224,33,122,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;color:var(--pink)}
    h2{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
    .hint{font-size:12px;color:#aaa;text-align:center;margin-bottom:24px}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:12px;font-weight:600;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .input-wrap{display:flex;align-items:center;background:#f5f5f7;border:1px solid var(--border);border-radius:var(--radius);padding:0 14px;transition:border-color .2s}
    .input-wrap:focus-within{border-color:var(--pink)}
    .input-wrap i{color:#bbb;font-size:18px;flex-shrink:0}
    input{border:none;background:transparent;padding:12px 10px;font-size:14px;outline:none;flex:1;font-family:inherit}
    .toggle-pw{cursor:pointer;color:#bbb;font-size:18px}
    .toggle-pw:hover{color:var(--pink)}
    .error{background:#fde8f0;color:#c0155a;border:1px solid #f9b8d2;border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .btn{width:100%;background:var(--pink);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s}
    .btn:hover{opacity:.88}
    .back{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;font-size:13px;color:#aaa;text-decoration:none}
    .back:hover{color:var(--pink)}
    .default-hint{background:#f0f5ff;border:1px solid #c7d9ff;border-radius:8px;padding:10px 14px;font-size:12px;color:#4a6fa5;margin-bottom:16px;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><i class="ti ti-notes"></i> NoteShare</div>
    <p class="subtitle">Admin Panel Access</p>
    <div class="lock-icon"><i class="ti ti-lock"></i></div>
    <h2>Enter Admin Password</h2>
    <p class="hint">Only authorized admins can access this panel</p>

    {% if error %}
    <div class="error"><i class="ti ti-alert-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="ti ti-user"></i>
          <input type="text" name="username" placeholder="Enter admin username" required autofocus />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="ti ti-lock"></i>
          <input type="password" name="password" id="pwInput" placeholder="Enter admin password" required />
          <span class="toggle-pw" onclick="togglePw()"><i class="ti ti-eye" id="eyeIcon"></i></span>
        </div>
      </div>
      <button type="submit" class="btn"><i class="ti ti-shield-check"></i> Login to Admin Panel</button>
    </form>
    <a href="/" class="back"><i class="ti ti-arrow-left"></i> Back to NoteShare</a>
  </div>
  <script>
    function togglePw() {
      const inp = document.getElementById('pwInput');
      const ico = document.getElementById('eyeIcon');
      if (inp.type === 'password') { inp.type = 'text'; ico.className = 'ti ti-eye-off'; }
      else { inp.type = 'password'; ico.className = 'ti ti-eye'; }
    }
  </script>
</body>
</html>
